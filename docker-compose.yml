name: tktask

services:
  app:
    build:
      context: .
    env_file:
      - ./.env
    volumes:
      - ./:/app
      - ./docker/php.ini:/usr/local/etc/php/conf.d/99-php.ini
    ports:
      - "${HTTP_APP_PORT:-80}:80"
      - "${HTTPS_APP_PORT:-443}:443"
      - "${HTTPS_APP_PORT:-443}:443/udp"
    tty: true
    restart: always
    environment:
      SERVER_NAME: :80
      DB_HOST: db
      DB_NAME: '${MARIADB_DATABASE}'
      DB_USER: '${MARIADB_USER}'
      DB_PASS: '${MARIADB_PASSWORD}'
    entrypoint: ["/bin/sh", "/app/docker/entry.sh"]
    command: ["frankenphp", "run", "--config", "/etc/caddy/Caddyfile"]
    depends_on:
      - db

  db:
    image: mariadb:latest
    env_file:
      - ./.env
    volumes:
      - db:/var/lib/mysql
      - ./docker/maria-init.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - '${DB_MARIADB_PORT:-3306}:3306'
    restart: unless-stopped
    tty: true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 3
      timeout: 5s

  mailpit:
    image: axllent/mailpit
    volumes:
      - ./docker/mailpit:/data
    ports:
      - "${HTTP_MAILPIT_PORT:-8025}:8025" # Web UI
      - "${SMTP_MAILPIT_PORT:-1025}:1025" # SMTP server
    restart: unless-stopped
    tty: true
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  caddy_data:
  caddy_config:
  db:
